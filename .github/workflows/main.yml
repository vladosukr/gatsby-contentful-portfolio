name: Test Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  long-running-test:
    runs-on: generic-runner
    timeout-minutes: 10

    steps:
      - name: Step 1 - Start
        run: |
          echo "=========================================="
          echo "🚀 JOB STARTED at $(date)"
          echo "Runner: $RUNNER_NAME"
          echo "Hostname: $(hostname)"
          echo "=========================================="
          sleep 5

      - name: Step 2 - Sleep 30s
        run: |
          echo "⏱️  Sleeping for 30 seconds..."
          sleep 30
          echo "✅ Step 2 complete at $(date)"

      - name: Step 3 - Sleep 30s
        run: |
          echo "⏱️  Sleeping for 30 seconds..."
          sleep 30
          echo "✅ Step 3 complete at $(date)"

      - name: Step 4 - Sleep 30s
        run: |
          echo "⏱️  Sleeping for 30 seconds..."
          sleep 30
          echo "✅ Step 4 complete at $(date)"

      - name: Step 5 - Sleep 30s
        run: |
          echo "⏱️  Sleeping for 30 seconds..."
          sleep 30
          echo "✅ Step 5 complete at $(date)"

      - name: Step 6 - Final
        run: |
          echo "=========================================="
          echo "✅ ALL STEPS COMPLETED"
          echo "Total runtime: ~2 minutes"
          echo "Finished at: $(date)"
          echo "=========================================="